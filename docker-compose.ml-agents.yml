services:
  identity:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: identity-service
    command: node src/identity-service.js
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: always

  game:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: game-service
    command: node src/game-service.js
    ports:
      - "3002:3002"
    env_file:
      - .env
    restart: always

  nginx:
    image: nginx:latest
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx_docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/WebGL_Build:/usr/share/nginx/html:ro
    depends_on:
      - identity
      - game
    restart: always
