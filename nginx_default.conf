server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;

    server_name _;

    # Servir el cliente (index.html y assets)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para la API y WebSockets
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Configuración limpia para archivos Unity WebGL comprimidos (.br)
    # Evitamos duplicidad de cabeceras y desactivamos compresión en tiempo de ejecución
    
    location ~ \.wasm\.br$ {
        gzip off;
        # brotli off; # Si el módulo está instalado, esto evita el doble br
        default_type application/wasm;
        add_header Content-Encoding br;
        add_header Access-Control-Allow-Origin *;
    }

    location ~ \.js\.br$ {
        gzip off;
        # brotli off;
        default_type application/javascript;
        add_header Content-Encoding br;
        add_header Access-Control-Allow-Origin *;
    }

    location ~ \.data\.br$ {
        gzip off;
        # brotli off;
        default_type application/octet-stream;
        add_header Content-Encoding br;
        add_header Access-Control-Allow-Origin *;
    }
}
