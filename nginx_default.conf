upstream identity_service {
    server localhost:3001;
}

upstream game_service {
    server localhost:3002;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;

    server_name _;

    # Servir el cliente (index.html y assets)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el Identity Service (Autenticación)
    location /api/users/ {
        proxy_pass http://identity_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy para el Game Service (API de Juegos y WebSockets)
    location /api/games/ {
        proxy_pass http://game_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Soporte para WebSockets genéricos (si el cliente apunta a la raíz /)
    location /socket.io/ {
        proxy_pass http://game_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Configuración limpia para archivos Unity WebGL comprimidos (.br)
    location ~ \.wasm\.br$ {
        gzip off;
        default_type application/wasm;
        add_header Content-Encoding br;
        add_header Access-Control-Allow-Origin *;
    }

    location ~ \.js\.br$ {
        gzip off;
        default_type application/javascript;
        add_header Content-Encoding br;
        add_header Access-Control-Allow-Origin *;
    }

    location ~ \.data\.br$ {
        gzip off;
        default_type application/octet-stream;
        add_header Content-Encoding br;
        add_header Access-Control-Allow-Origin *;
    }
}
