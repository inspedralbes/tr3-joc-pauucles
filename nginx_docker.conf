server {
    listen 80;
    server_name localhost;

    # Tipos MIME para Unity WebGL
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
        application/octet-stream data;
        application/javascript js;
        application/json json;
    }

    # Servir la build de Unity WebGL
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Habilitar compresión si Unity la usa
        location ~* \.(js|wasm|data|symbols\.json)$ {
            gzip_static on;
        }
    }

    # Proxy per al Identity Service
    location /api/users/ {
        proxy_pass http://identity:3001/api/users/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy per al Game Service i WebSockets
    location /api/games/ {
        proxy_pass http://game:3002/api/games/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Suport per a Socket.io si s'utilitza a l'arrel
    location /socket.io/ {
        proxy_pass http://game:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
